<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Food Diary"/>
  <meta name="theme-color" content="#FDFAF6"/>
  <title>Food Diary 🍓🍵</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Instrument+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #FDFAF6; font-family: 'Instrument Sans', sans-serif; color: #1C1C1A; -webkit-font-smoothing: antialiased; }
    input, button, select, textarea { font-family: 'Instrument Sans', sans-serif; }
    ::-webkit-scrollbar { width: 4px; height: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #E8E4DE; border-radius: 99px; }
    input::placeholder { color: #C8C5C0; }
    #install-banner { display:none; position:fixed; bottom:16px; left:50%; transform:translateX(-50%); background:#1C1C1A; color:#fff; border-radius:12px; padding:12px 18px; font-size:12px; font-weight:600; box-shadow:0 4px 20px rgba(0,0,0,.25); z-index:9999; align-items:center; gap:12px; max-width:340px; width:calc(100% - 32px); }
    #install-banner.show { display:flex; }
    #install-btn { background:#E8526A; color:#fff; border:none; border-radius:8px; padding:6px 14px; font-size:11px; font-weight:700; cursor:pointer; }
    #dismiss-btn { background:none; border:none; color:#ffffff66; cursor:pointer; font-size:16px; margin-left:auto; }

    /* Scanner overlay */
    #scanner-overlay { display:none; position:fixed; inset:0; background:#000; z-index:9000; flex-direction:column; }
    #scanner-overlay.show { display:flex; }
    #scanner-video { width:100%; height:100%; object-fit:cover; }
    .scan-frame { position:absolute; top:50%; left:50%; transform:translate(-50%,-60%); width:260px; height:160px; border:2px solid #E8526A; border-radius:12px; box-shadow:0 0 0 9999px rgba(0,0,0,.55); }
    .scan-line { position:absolute; top:0; left:0; right:0; height:2px; background:linear-gradient(90deg,transparent,#E8526A,transparent); animation:scanAnim 1.8s linear infinite; }
    @keyframes scanAnim { 0%{top:0} 100%{top:calc(100% - 2px)} }
    .scan-corner { position:absolute; width:18px; height:18px; border-color:#E8526A; border-style:solid; }
    .scan-corner.tl { top:-2px; left:-2px; border-width:3px 0 0 3px; border-radius:4px 0 0 0; }
    .scan-corner.tr { top:-2px; right:-2px; border-width:3px 3px 0 0; border-radius:0 4px 0 0; }
    .scan-corner.bl { bottom:-2px; left:-2px; border-width:0 0 3px 3px; border-radius:0 0 0 4px; }
    .scan-corner.br { bottom:-2px; right:-2px; border-width:0 3px 3px 0; border-radius:0 0 4px 0; }
    #scan-close { position:absolute; top:max(env(safe-area-inset-top,0px),16px); right:16px; background:rgba(0,0,0,.5); border:none; color:#fff; border-radius:99px; width:36px; height:36px; font-size:18px; cursor:pointer; display:flex; align-items:center; justify-content:center; }
    #scan-hint { position:absolute; bottom:30%; left:50%; transform:translateX(-50%); color:#fff; font-size:12px; opacity:.8; white-space:nowrap; }
    #scan-result { position:absolute; bottom:22%; left:50%; transform:translateX(-50%); background:#fff; border-radius:10px; padding:10px 18px; font-size:13px; font-weight:600; color:#1C1C1A; white-space:nowrap; opacity:0; transition:opacity .3s; }
    #scan-result.show { opacity:1; }

    /* Modal backdrop */
    .modal-backdrop { position:fixed; inset:0; background:rgba(28,28,26,.5); z-index:8000; display:flex; align-items:flex-end; justify-content:center; padding:0; animation:fadeIn .2s; }
    .modal-sheet { background:#FDFAF6; border-radius:20px 20px 0 0; width:100%; max-width:520px; max-height:92vh; overflow-y:auto; padding:20px 18px max(env(safe-area-inset-bottom,0px),24px); animation:slideUp .25s ease; }
    @keyframes fadeIn { from{opacity:0} to{opacity:1} }
    @keyframes slideUp { from{transform:translateY(40px);opacity:0} to{transform:translateY(0);opacity:1} }
    .modal-handle { width:36px; height:4px; background:#E8E4DE; border-radius:99px; margin:0 auto 16px; }
  </style>
  <script>
    const manifestData = { name:"Food Diary 🍓🍵", short_name:"Food Diary", start_url:"./food-diary.html", display:"standalone", background_color:"#FDFAF6", theme_color:"#FDFAF6", orientation:"portrait", icons:[{src:"data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 512 512'%3E%3Crect width='512' height='512' rx='112' fill='%23FDFAF6'/%3E%3Ctext y='340' x='90' font-size='300'%3E🍓%3C/text%3E%3C/svg%3E",sizes:"512x512",type:"image/svg+xml",purpose:"any maskable"}] };
    const blob = new Blob([JSON.stringify(manifestData)],{type:'application/json'});
    document.write(`<link rel="manifest" href="${URL.createObjectURL(blob)}">`);
  </script>
</head>
<body>
<div id="root"></div>
<div id="install-banner"><span>📲 Add to home screen</span><button id="install-btn">Install</button><button id="dismiss-btn">✕</button></div>

<!-- Barcode Scanner Overlay -->
<div id="scanner-overlay">
  <video id="scanner-video" autoplay playsinline muted></video>
  <div class="scan-frame">
    <div class="scan-line"></div>
    <div class="scan-corner tl"></div><div class="scan-corner tr"></div>
    <div class="scan-corner bl"></div><div class="scan-corner br"></div>
  </div>
  <button id="scan-close">✕</button>
  <div id="scan-hint">Point camera at barcode</div>
  <div id="scan-result"></div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<!-- ZXing barcode library -->
<script src="https://unpkg.com/@zxing/library@0.19.1/umd/index.min.js"></script>

<script type="text/babel">
const { useState, useRef, useEffect, useCallback } = React;

// ── Theme ─────────────────────────────────────────────────────
const T = {
  strawberry:"#E8526A", strawberryLight:"#FDE8EB", strawberryMid:"#F4A0AE",
  matcha:"#6B8F5E", matchaLight:"#EBF2E8", matchaMid:"#A8C4A0",
  cream:"#FDFAF6", paper:"#F7F3EE", ink:"#1C1C1A",
  inkLight:"#6B6B68", inkFaint:"#C8C5C0", border:"#E8E4DE", white:"#FFFFFF",
};
const MAINTENANCE = 1700;
const MEAL_ORDER = ["Breakfast","Lunch","Dinner","Snack"];
const MEAL_META = {
  Breakfast:{icon:"○",color:T.strawberry,light:T.strawberryLight},
  Lunch:    {icon:"◐",color:T.matcha,    light:T.matchaLight},
  Dinner:   {icon:"●",color:T.ink,       light:T.paper},
  Snack:    {icon:"◇",color:T.inkLight,  light:T.paper},
};
const QUICK_FOODS = ["Nasi lemak","Roti canai","Teh tarik","Nasi goreng","Curry laksa","Milo ais","Char kway teow","Cendol","Bak kut teh","Apam balik"];

// ── Storage helpers ───────────────────────────────────────────
function ls(key, fallback={}) { try { return JSON.parse(localStorage.getItem(key)||"null") ?? fallback; } catch { return fallback; } }
function lsSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); } catch {} }

function toDateKey(d) { return d.toISOString().slice(0,10); }
function fmtLong(dk) { return new Date(dk+"T00:00:00").toLocaleDateString("en-MY",{weekday:"long",day:"numeric",month:"long",year:"numeric"}); }
function fmtShort(dk) { return new Date(dk+"T00:00:00").toLocaleDateString("en-MY",{day:"numeric",month:"short"}); }
function isToday(dk) { return dk===toDateKey(new Date()); }

// ── AI fetch ──────────────────────────────────────────────────
async function fetchNutrition(food, amount, apiKey) {
  const res = await fetch("https://api.anthropic.com/v1/messages",{
    method:"POST",
    headers:{"Content-Type":"application/json","x-api-key":apiKey,"anthropic-version":"2023-06-01"},
    body:JSON.stringify({ model:"claude-sonnet-4-20250514", max_tokens:300, messages:[{role:"user",content:`You are a Malaysian nutrition expert. Estimate nutrition for: "${amount} of ${food}".
Return ONLY JSON (no markdown): {"calories":<int>,"protein":<float>,"fiber":<float>,"note":"<optional short note>"}
Adjust for Malaysian portions. Honour modifiers like "small", "not too thick", etc.`}] })
  });
  const d = await res.json();
  const text = d.content?.map(b=>b.text||"").join("")||"";
  try { const m=text.replace(/```json[\s\S]*?```/g,s=>s.replace(/```json|```/g,"")).match(/\{[\s\S]*\}/); if(m) return JSON.parse(m[0]); } catch {}
  return null;
}

// ── Tiny UI helpers ───────────────────────────────────────────
function Pill({label,value,unit,accent,sub}) {
  return (
    <div style={{flex:1,minWidth:72,padding:"10px 12px",borderRadius:12,background:T.white,border:`1px solid ${T.border}`,textAlign:"center"}}>
      <div style={{fontSize:9,fontWeight:700,color:T.inkFaint,textTransform:"uppercase",letterSpacing:1.2}}>{label}</div>
      <div style={{fontSize:18,fontWeight:700,color:accent,fontFamily:"'Cormorant Garamond',serif",lineHeight:1.1,marginTop:2}}>
        {value}<span style={{fontSize:10,color:T.inkFaint,marginLeft:1}}>{unit}</span>
      </div>
      {sub&&<div style={{fontSize:9,color:T.inkFaint,marginTop:1}}>{sub}</div>}
    </div>
  );
}

function FInput({value,onChange,placeholder,style={},inputRef,type="text",step,min}) {
  const [focused,setFocused] = useState(false);
  return <input ref={inputRef} type={type} step={step} min={min} value={value} onChange={onChange} placeholder={placeholder}
    style={{width:"100%",padding:"9px 12px",borderRadius:8,border:`1px solid ${focused?T.matcha:T.border}`,background:T.cream,color:T.ink,fontSize:13,outline:"none",transition:"border .15s",...style}}
    onFocus={()=>setFocused(true)} onBlur={()=>setFocused(false)}/>;
}

function ModalSheet({children,onClose}) {
  return (
    <div className="modal-backdrop" onClick={e=>{if(e.target===e.currentTarget)onClose();}}>
      <div className="modal-sheet">
        <div className="modal-handle"/>
        {children}
      </div>
    </div>
  );
}

// ── API Key Gate ──────────────────────────────────────────────
function ApiKeyGate({onSave}) {
  const [key,setKey]=useState(""); const [show,setShow]=useState(false);
  useEffect(()=>{ const k=localStorage.getItem("fd_apikey"); if(k) onSave(k); },[]);
  function save(e) { e.preventDefault(); if(!key.trim())return; localStorage.setItem("fd_apikey",key.trim()); onSave(key.trim()); }
  if(localStorage.getItem("fd_apikey")) return null;
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(28,28,26,.6)",display:"flex",alignItems:"center",justifyContent:"center",zIndex:9500,padding:20}}>
      <div style={{background:T.white,borderRadius:16,padding:24,width:"100%",maxWidth:360,border:`1px solid ${T.border}`}}>
        <div style={{fontSize:10,letterSpacing:2.5,textTransform:"uppercase",color:T.inkFaint,marginBottom:4}}>Setup</div>
        <div style={{fontSize:20,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,marginBottom:10}}>Enter your API Key</div>
        <p style={{fontSize:12,color:T.inkLight,lineHeight:1.7,marginBottom:16}}>
          Needed for AI nutrition estimates. Get a free key at <a href="https://console.anthropic.com" target="_blank" style={{color:T.strawberry}}>console.anthropic.com</a>.
          <br/>Your key is stored only on this device.
        </p>
        <form onSubmit={save}>
          <div style={{position:"relative",marginBottom:10}}>
            <FInput value={key} onChange={e=>setKey(e.target.value)} placeholder="sk-ant-..." type={show?"text":"password"} style={{paddingRight:44}}/>
            <button type="button" onClick={()=>setShow(s=>!s)} style={{position:"absolute",right:10,top:"50%",transform:"translateY(-50%)",background:"none",border:"none",color:T.inkFaint,cursor:"pointer",fontSize:11}}>{show?"hide":"show"}</button>
          </div>
          <div style={{fontSize:11,color:T.inkFaint,marginBottom:14}}>💡 You can skip and use Manual or Library mode without an API key.</div>
          <button type="submit" style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:T.matcha,color:T.white,fontSize:11,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",cursor:"pointer",marginBottom:8}}>Save & Continue →</button>
          <button type="button" onClick={()=>onSave("__manual__")} style={{width:"100%",padding:"9px",borderRadius:8,border:`1px solid ${T.border}`,background:"transparent",color:T.inkLight,fontSize:11,fontWeight:600,cursor:"pointer"}}>Skip — manual mode only</button>
        </form>
      </div>
    </div>
  );
}

// ── Food Library Screen ───────────────────────────────────────
function FoodLibrary({library,onAdd,onDelete,onClose,onSelect}) {
  const [view,setView] = useState("list"); // list | add
  const [name,setName] = useState("");
  const [barcode,setBarcode] = useState("");
  const [cal100,setCal100] = useState("");
  const [pro100,setPro100] = useState("");
  const [fib100,setFib100] = useState("");
  const [photo,setPhoto] = useState(null);
  const [search,setSearch] = useState("");
  const fileRef = useRef();

  const filtered = library.filter(f=>f.name.toLowerCase().includes(search.toLowerCase())||f.barcode?.includes(search));

  function handlePhotoFile(e) {
    const file = e.target.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = ev => setPhoto(ev.target.result);
    reader.readAsDataURL(file);
  }

  function handleSave() {
    if(!name.trim()||!cal100) return;
    onAdd({ id:Date.now().toString(), name:name.trim(), barcode:barcode.trim()||null, cal100:parseFloat(cal100), pro100:parseFloat(pro100)||0, fib100:parseFloat(fib100)||0, photo });
    setName(""); setBarcode(""); setCal100(""); setPro100(""); setFib100(""); setPhoto(null); setView("list");
  }

  function openScanner() {
    window._scanTarget = "library";
    window._onScanResult = (code)=>{ setBarcode(code); };
    startScanner();
  }

  return (
    <ModalSheet onClose={onClose}>
      {view==="list" ? (
        <>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:14}}>
            <div>
              <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:T.inkFaint,marginBottom:2}}>Food Library</div>
              <div style={{fontSize:18,fontFamily:"'Cormorant Garamond',serif",fontWeight:600}}>Saved Foods</div>
            </div>
            <button onClick={()=>setView("add")} style={{padding:"7px 14px",borderRadius:8,border:"none",background:T.matcha,color:T.white,fontSize:11,fontWeight:700,cursor:"pointer"}}>+ Add</button>
          </div>
          <FInput value={search} onChange={e=>setSearch(e.target.value)} placeholder="Search by name or barcode…" style={{marginBottom:12}}/>
          {filtered.length===0 ? (
            <div style={{textAlign:"center",padding:"40px 0",color:T.inkFaint}}>
              <div style={{fontSize:28,marginBottom:8}}>📦</div>
              <div style={{fontSize:11,letterSpacing:1.5,textTransform:"uppercase"}}>{search?"No results":"Library is empty"}</div>
              <div style={{fontSize:11,marginTop:4}}>Tap + Add to save a food</div>
            </div>
          ) : filtered.map(food=>(
            <div key={food.id} style={{display:"flex",alignItems:"center",gap:10,padding:"10px 0",borderBottom:`1px solid ${T.border}`}}>
              <div style={{width:40,height:40,borderRadius:8,background:T.paper,overflow:"hidden",flexShrink:0,display:"flex",alignItems:"center",justifyContent:"center"}}>
                {food.photo ? <img src={food.photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:18}}>🏷️</span>}
              </div>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{food.name}</div>
                <div style={{fontSize:10,color:T.inkFaint}}>{food.cal100} kcal · {food.pro100}g P · {food.fib100}g F <span style={{color:T.inkFaint}}>per 100g</span></div>
                {food.barcode&&<div style={{fontSize:9,color:T.inkFaint,marginTop:1}}>📊 {food.barcode}</div>}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>onSelect(food)} style={{padding:"5px 12px",borderRadius:7,border:"none",background:T.matchaLight,color:T.matcha,fontSize:11,fontWeight:700,cursor:"pointer"}}>Log</button>
                <button onClick={()=>onDelete(food.id)} style={{padding:"5px 8px",borderRadius:7,border:"none",background:T.strawberryLight,color:T.strawberry,fontSize:13,cursor:"pointer"}}>×</button>
              </div>
            </div>
          ))}
        </>
      ) : (
        <>
          <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
            <button onClick={()=>setView("list")} style={{background:"none",border:"none",color:T.inkLight,cursor:"pointer",fontSize:18,lineHeight:1,padding:"0 4px 0 0"}}>←</button>
            <div>
              <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:T.inkFaint}}>Food Library</div>
              <div style={{fontSize:18,fontFamily:"'Cormorant Garamond',serif",fontWeight:600}}>New Food</div>
            </div>
          </div>

          {/* Photo */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:T.inkFaint,letterSpacing:.8,textTransform:"uppercase",marginBottom:6}}>Photo (optional)</div>
            <div style={{display:"flex",gap:10,alignItems:"center"}}>
              <div onClick={()=>fileRef.current.click()} style={{width:72,height:72,borderRadius:10,background:T.paper,border:`1.5px dashed ${T.border}`,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",overflow:"hidden",flexShrink:0}}>
                {photo ? <img src={photo} style={{width:"100%",height:"100%",objectFit:"cover"}}/> : <span style={{fontSize:24}}>📷</span>}
              </div>
              <div style={{flex:1}}>
                <button onClick={()=>fileRef.current.click()} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px solid ${T.border}`,background:"transparent",color:T.inkLight,fontSize:11,cursor:"pointer",marginBottom:6}}>
                  📁 Choose photo or take a picture
                </button>
                <input ref={fileRef} type="file" accept="image/*" capture="environment" onChange={handlePhotoFile} style={{display:"none"}}/>
              </div>
            </div>
          </div>

          {/* Name */}
          <div style={{marginBottom:10}}>
            <div style={{fontSize:10,fontWeight:700,color:T.ink,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Food Name *</div>
            <FInput value={name} onChange={e=>setName(e.target.value)} placeholder="e.g. Gardenia Wholemeal Bread"/>
          </div>

          {/* Barcode */}
          <div style={{marginBottom:14}}>
            <div style={{fontSize:10,fontWeight:700,color:T.inkFaint,letterSpacing:.8,textTransform:"uppercase",marginBottom:4}}>Barcode (optional)</div>
            <div style={{display:"flex",gap:7}}>
              <FInput value={barcode} onChange={e=>setBarcode(e.target.value)} placeholder="Scan or type barcode" style={{flex:1}}/>
              <button onClick={openScanner} style={{padding:"9px 12px",borderRadius:8,border:`1px solid ${T.border}`,background:T.paper,color:T.ink,fontSize:12,cursor:"pointer",flexShrink:0,fontWeight:600}}>
                📷 Scan
              </button>
            </div>
          </div>

          {/* Per 100g nutrition */}
          <div style={{background:T.matchaLight,borderRadius:10,padding:"12px 14px",marginBottom:14,border:`1px solid ${T.matchaMid}`}}>
            <div style={{fontSize:10,fontWeight:700,color:T.matcha,letterSpacing:.8,textTransform:"uppercase",marginBottom:10}}>Nutrition per 100g *</div>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
              <div>
                <div style={{fontSize:9,fontWeight:700,color:T.strawberry,letterSpacing:.5,textTransform:"uppercase",marginBottom:3}}>Calories</div>
                <FInput value={cal100} onChange={e=>setCal100(e.target.value)} placeholder="e.g. 265" type="number" min="0" style={{padding:"7px 9px",fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:9,fontWeight:700,color:T.matcha,letterSpacing:.5,textTransform:"uppercase",marginBottom:3}}>Protein g</div>
                <FInput value={pro100} onChange={e=>setPro100(e.target.value)} placeholder="e.g. 8" type="number" min="0" step="0.1" style={{padding:"7px 9px",fontSize:12}}/>
              </div>
              <div>
                <div style={{fontSize:9,fontWeight:700,color:T.matcha,letterSpacing:.5,textTransform:"uppercase",marginBottom:3}}>Fiber g</div>
                <FInput value={fib100} onChange={e=>setFib100(e.target.value)} placeholder="e.g. 3" type="number" min="0" step="0.1" style={{padding:"7px 9px",fontSize:12}}/>
              </div>
            </div>
          </div>

          <button onClick={handleSave} disabled={!name.trim()||!cal100} style={{width:"100%",padding:"10px",borderRadius:8,border:"none",background:(!name.trim()||!cal100)?T.border:T.matcha,color:(!name.trim()||!cal100)?T.inkFaint:T.white,fontSize:11,fontWeight:700,letterSpacing:.5,textTransform:"uppercase",cursor:(!name.trim()||!cal100)?"not-allowed":"pointer"}}>
            Save to Library
          </button>
        </>
      )}
    </ModalSheet>
  );
}

// ── Log-from-Library Modal ────────────────────────────────────
function LogFromLibrary({food, onConfirm, onClose}) {
  const [grams, setGrams] = useState("100");
  const g = parseFloat(grams)||0;
  const cal = Math.round(food.cal100 * g / 100);
  const pro = (food.pro100 * g / 100).toFixed(1);
  const fib = (food.fib100 * g / 100).toFixed(1);

  return (
    <ModalSheet onClose={onClose}>
      <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:T.inkFaint,marginBottom:4}}>Log Food</div>
      <div style={{fontSize:20,fontFamily:"'Cormorant Garamond',serif",fontWeight:600,marginBottom:14}}>{food.name}</div>

      {food.photo && <img src={food.photo} style={{width:"100%",height:120,objectFit:"cover",borderRadius:10,marginBottom:14}}/>}

      <div style={{background:T.paper,borderRadius:10,padding:"10px 14px",marginBottom:14,fontSize:11,color:T.inkFaint}}>

          </div>

        </div>
      )}

      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {MEAL_ORDER.map(m=>{

              onMouseLeave={e=>{e.currentTarget.style.background=T.paper;e.currentTarget.style.borderColor=T.border;}}>
              <span style={{color:mm.color}}>{mm.icon}</span>{m}
            </button>
          );
        })}
      </div>
    </ModalSheet>
  );
}

// ── Barcode scanner logic (global, not React) ─────────────────
let codeReader = null;
function startScanner() {
  document.getElementById("scanner-overlay").classList.add("show");
  const video = document.getElementById("scanner-video");
  const result = document.getElementById("scan-result");
  result.classList.remove("show");

  if(window.ZXing) {
    codeReader = new ZXing.BrowserMultiFormatReader();
    codeReader.decodeFromVideoDevice(null, video, (res, err) => {
      if(res) {
        const code = res.getText();
        result.textContent = "✓ " + code;
        result.classList.add("show");
        if(window._onScanResult) window._onScanResult(code);
        setTimeout(stopScanner, 900);
      }
    }).catch(()=>{});
  } else {
    // fallback: show manual input hint
    document.getElementById("scan-hint").textContent = "Scanner unavailable — type barcode manually";
  }
}
function stopScanner() {
  if(codeReader) { try { codeReader.reset(); } catch {} codeReader=null; }
  const video = document.getElementById("scanner-video");
  if(video.srcObject) { video.srcObject.getTracks().forEach(t=>t.stop()); video.srcObject=null; }
  document.getElementById("scanner-overlay").classList.remove("show");
}
document.getElementById("scan-close").addEventListener("click", stopScanner);

    e.preventDefault(); if(!foodInput.trim()) return; setErr("");
    if(mode==="manual") {
      const cal=parseFloat(manCal); if(!cal||isNaN(cal)){setErr("Please enter calories.");return;}
      setPending({food:foodInput.trim(),amount:amtInput.trim()||"1 serving",calories:cal,protein:parseFloat(manPro)||0,fiber:parseFloat(manFib)||0,manual:true});
    } else {
      if(!apiKey||apiKey==="__manual__"){setErr("No API key. Use Manual mode or Library.");return;}
      setPending({food:foodInput.trim(),amount:amtInput.trim()||"1 serving"});
    }
    setStep("meal");
  }

  async function handleMealPick(meal) {
    setStep("loading"); setNote(""); setErr("");
    if(pending.manual) {
      addEntry({meal,food:pending.food,amount:pending.amount,calories:pending.calories,protein:pending.protein,fiber:pending.fiber});
      reset();
    } else {
      try {
        const d=await fetchNutrition(pending.food,pending.amount,apiKey);
        if(!d) throw new Error();
        addEntry({meal,food:pending.food,amount:pending.amount,calories:d.calories,protein:d.protein,fiber:d.fiber});

            {/* Meal picker */}
            {!readOnly&&step==="meal"&&pending&&(
              <div style={{marginTop:12,background:T.white,borderRadius:12,border:`1px solid ${T.border}`,padding:"14px"}}>
                <div style={{fontSize:10,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",color:T.inkLight,marginBottom:4}}>Choose meal</div>
                <div style={{fontSize:11,color:T.inkFaint,marginBottom:12,fontStyle:"italic"}}>{pending.amount} · {pending.food}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7}}>
                  {MEAL_ORDER.map(m=>{const mm=MEAL_META[m];return(
                    <button key={m} onClick={()=>handleMealPick(m)} style={{padding:"11px",borderRadius:8,border:`1px solid ${T.border}`,background:T.paper,color:T.ink,fontWeight:600,fontSize:12,cursor:"pointer",display:"flex",alignItems:"center",gap:7,transition:"all .12s"}}
                    onMouseEnter={e=>{e.currentTarget.style.background=mm.light;e.currentTarget.style.borderColor=mm.color;}}
                    onMouseLeave={e=>{e.currentTarget.style.background=T.paper;e.currentTarget.style.borderColor=T.border;}}>
                      <span style={{color:mm.color}}>{mm.icon}</span>{m}
                    </button>
                  );})}
                </div>
                <button onClick={()=>{setStep("form");setPending(null);}} style={{marginTop:8,width:"100%",padding:"7px",borderRadius:8,background:"transparent",border:`1px solid ${T.border}`,color:T.inkFaint,fontSize:10,cursor:"pointer"}}>← Back</button>
              </div>
            )}

            {/* Loading */}
            {!readOnly&&step==="loading"&&(
              <div style={{marginTop:12,background:T.white,borderRadius:12,border:`1px solid ${T.border}`,padding:"26px 20px",textAlign:"center"}}>
                <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:T.matcha,fontWeight:600}}>Calculating…</div>
                <div style={{fontSize:10,color:T.inkFaint,marginTop:4}}>Adjusting for Malaysian portions</div>
              </div>
            )}

            {note&&<div style={{marginTop:9,padding:"7px 11px",borderRadius:8,background:T.matchaLight,border:`1px solid ${T.matchaMid}`,fontSize:11,color:T.matcha}}>💡 {note}</div>}

            {/* Food log table */}
            {entries.length>0&&(
              <div style={{marginTop:16,marginBottom:24}}>
                {MEAL_ORDER.map(meal=>{
                  const rows=grouped[meal]; if(!rows.length) return null;
                  const mm=MEAL_META[meal];
                  const mt=rows.reduce((a,e)=>({cal:a.cal+e.calories,pro:a.pro+e.protein,fib:a.fib+e.fiber}),{cal:0,pro:0,fib:0});
                  return (
                    <div key={meal} style={{marginBottom:10,background:T.white,borderRadius:10,border:`1px solid ${T.border}`,overflow:"hidden"}}>
                      <div style={{display:"flex",alignItems:"center",gap:7,padding:"9px 13px",borderBottom:`1px solid ${T.border}`,background:mm.light}}>
                        <span style={{color:mm.color,fontSize:12}}>{mm.icon}</span>
                        <span style={{fontWeight:600,fontSize:11}}>{meal}</span>
                        <span style={{marginLeft:"auto",fontSize:9,color:T.inkFaint}}>{mt.cal} kcal · {mt.pro.toFixed(1)}g P · {mt.fib.toFixed(1)}g F</span>
                      </div>
                      {rows.map((entry,i)=>(
                        <div key={entry.id}>
                          {i>0&&<div style={{height:1,background:T.border}}/>}
                          <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 13px"}}>
                            <div style={{flex:1,minWidth:0}}>
                              <div style={{fontSize:12,fontWeight:600,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{entry.food}</div>
                              <div style={{fontSize:10,color:T.inkFaint,marginTop:1}}>{entry.amount}</div>
                            </div>
                            <div style={{display:"flex",gap:10,alignItems:"center",flexShrink:0}}>
                              <div style={{fontSize:12,fontWeight:700,color:T.strawberry,fontFamily:"'Cormorant Garamond',serif"}}>{entry.calories}<span style={{fontSize:9,color:T.inkFaint,marginLeft:1}}>kcal</span></div>
                              <div style={{textAlign:"right",minWidth:34}}><div style={{fontSize:10,color:T.matcha,fontWeight:600}}>{entry.protein.toFixed(1)}g</div><div style={{fontSize:9,color:T.inkFaint}}>prot</div></div>
                              <div style={{textAlign:"right",minWidth:30}}><div style={{fontSize:10,color:T.matcha,fontWeight:600}}>{entry.fiber.toFixed(1)}g</div><div style={{fontSize:9,color:T.inkFaint}}>fiber</div></div>
                              {!readOnly&&<button onClick={()=>removeEntry(entry.id)} style={{background:"none",border:"none",color:T.inkFaint,cursor:"pointer",fontSize:15,padding:"0 2px",lineHeight:1}} onMouseEnter={e=>e.currentTarget.style.color=T.strawberry} onMouseLeave={e=>e.currentTarget.style.color=T.inkFaint}>×</button>}
                            </div>
                          </div>
                        </div>
                      ))}
                    </div>
                  );
                })}
                <div style={{background:T.ink,borderRadius:10,padding:"11px 15px",display:"flex",flexWrap:"wrap",gap:10,alignItems:"center"}}>
                  <span style={{fontSize:10,fontWeight:700,letterSpacing:.8,textTransform:"uppercase",color:"#ffffff66",flex:1}}>Daily Total</span>
                  <span style={{fontSize:11,color:T.strawberryMid,fontWeight:600}}>🔥 {totals.cal} kcal</span>
                  <span style={{fontSize:11,color:T.matchaMid,fontWeight:600}}>💪 {totals.pro.toFixed(1)}g</span>
                  <span style={{fontSize:11,color:T.matchaMid,fontWeight:600}}>🌿 {totals.fib.toFixed(1)}g</span>
                  <span style={{fontSize:10,color:deficit>=0?T.matchaMid:T.strawberryMid,fontWeight:600,background:"#ffffff11",borderRadius:6,padding:"2px 7px"}}>{deficit>=0?`−${deficit} deficit`:`+${Math.abs(deficit)} surplus`}</span>
                </div>
              </div>
            )}

            {entries.length===0&&step==="form"&&(
              <div style={{textAlign:"center",padding:"50px 20px"}}>
                <div style={{fontSize:10,letterSpacing:2,textTransform:"uppercase",color:T.inkFaint}}>{readOnly?"Nothing logged this day":"Start logging"}</div>
                {!readOnly&&<div style={{fontSize:11,color:T.inkFaint,marginTop:4}}>Add a meal above or scan a barcode</div>}
              </div>
            )}
          </>
        )}
      </div>

      {/* Library modal */}
      {showLibrary&&<FoodLibrary library={library} onAdd={addToLibrary} onDelete={deleteFromLibrary} onClose={()=>setShowLibrary(false)} onSelect={handleLibraryLog}/>}

      {/* Log-from-library modal */}
      {logFood&&<LogFromLibrary food={logFood} onConfirm={handleLibraryConfirm} onClose={()=>setLogFood(null)}/>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

<script>
  // PWA install
  let deferredPrompt;
  window.addEventListener("beforeinstallprompt",(e)=>{ e.preventDefault(); deferredPrompt=e; document.getElementById("install-banner").classList.add("show"); });
  document.getElementById("install-btn").addEventListener("click",async()=>{ if(deferredPrompt){deferredPrompt.prompt();await deferredPrompt.userChoice;deferredPrompt=null;} document.getElementById("install-banner").classList.remove("show"); });
  document.getElementById("dismiss-btn").addEventListener("click",()=>document.getElementById("install-banner").classList.remove("show"));

  // Service worker for offline
  if("serviceWorker" in navigator) {
    const sw=`const C="fd-v1",A=[self.location.pathname];self.addEventListener("install",e=>e.waitUntil(caches.open(C).then(c=>c.addAll(A))));self.addEventListener("fetch",e=>e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request).catch(()=>caches.match(e.request)))));`;
    navigator.serviceWorker.register(URL.createObjectURL(new Blob([sw],{type:"application/javascript"}))).catch(()=>{});
  }
</script>
</body>
</html>
